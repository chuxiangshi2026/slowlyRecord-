<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专注模式</title>
  <style>
    /* SVG 图标样式 */
    .icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.15s, color 0.3s ease;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    .icon.disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .icon:hover:not(.disabled) {
      opacity: 0.6;
    }
  </style>
  <style>
    /* CSS 变量定义 */
    :root {
      /* 亮色主题 (默认) */
      --bg-primary: #ffffff;
      --text-primary: #262626;
      --text-secondary: #595959;
      --text-tertiary: #8c8c8c;
      --text-quaternary: #bfbfbf;
      --border-color: #d9d9d9;
      --primary-color: #409eff;
      --danger-color: #f56c6c;
      --success-color: #67c23a;
    }

    /* 暗黑主题 */
    .dark-theme,
    html.utools-dark,
    body.utools-dark {
      --bg-primary: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-tertiary: #808080;
      --text-quaternary: #606060;
      --border-color: #3e3e42;
      --primary-color: #5b8cff;
      --danger-color: #e57373;
      --success-color: #81c784;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      /* 初始透明背景，让 Electron 透明窗口正常工作 */
      background: transparent !important;
      transition: background-color 0.3s ease;
    }

    .focus-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      position: relative;
      /* 允许拖拽移动窗口 */
      -webkit-app-region: drag;
      /* 设置背景色，支持透明 */
      background: var(--bg-primary);
      transition: background-color 0.3s ease;
    }

    /* 按钮区域不响应拖拽，允许点击 */
    .actions, .btn-close, .counter {
      -webkit-app-region: no-drag;
    }

    .word {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
      text-align: center;
      user-select: none;
      transition: color 0.3s ease;
    }

    .explains {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 6px;
      max-width: 95%;
      line-height: 1.3;
      user-select: none;
      transition: color 0.3s ease;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .actions .icon {
      color: var(--text-secondary);
    }

    .actions .icon-forgot {
      color: var(--text-tertiary);
    }

    .actions .icon-forgot:hover:not(.disabled) {
      color: var(--danger-color);
    }

    .actions .icon-remember {
      color: var(--success-color);
    }

    .btn-close {
      position: absolute;
      top: 2px;
      right: 6px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-close:hover {
      color: var(--text-primary);
    }

    .btn-top {
      position: absolute;
      top: 2px;
      right: 26px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-top:hover {
      color: var(--primary-color);
    }

    .btn-top.active {
      color: var(--primary-color);
    }

    .btn-edge {
      position: absolute;
      top: 2px;
      right: 46px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-edge:hover {
      color: var(--primary-color);
    }

    .btn-edge.active {
      color: var(--primary-color);
    }

    .btn-list {
      position: absolute;
      top: 2px;
      right: 66px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-list:hover {
      color: var(--primary-color);
    }

    /* 贴边悬浮球样式 */
    .edge-bubble {
      position: absolute;
      top: 50%;
      transform: translateY(-50%) scale(0.94);
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary-color), #7aa8ff);
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(64, 158, 255, 0.32);
      z-index: 100;
      -webkit-app-region: no-drag;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .dark-theme .edge-bubble,
    html.utools-dark .edge-bubble,
    body.utools-dark .edge-bubble {
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    .edge-bubble:hover {
      transform: translateY(-50%) scale(1);
      box-shadow: 0 10px 24px rgba(64, 158, 255, 0.38);
    }

    .edge-bubble.left {
      right: 4px;
    }

    .edge-bubble.right {
      left: 4px;
    }


    .edge-bubble.visible {
      display: flex;
    }

    .edge-bubble svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      pointer-events: none;
    }

    /* 贴边隐藏时隐藏主要内容，仅保留悬浮球 */
    .focus-container.edge-hidden {
      background: transparent !important;
    }

    .focus-container.edge-hidden .word,
    .focus-container.edge-hidden .explains,
    .focus-container.edge-hidden .actions,
    .focus-container.edge-hidden .btn-close,
    .focus-container.edge-hidden .btn-top,
    .focus-container.edge-hidden .btn-edge,
    .focus-container.edge-hidden .btn-list,
    .focus-container.edge-hidden .opacity-bar,
    .focus-container.edge-hidden .counter {
      opacity: 0;
      pointer-events: none;
    }

    .focus-container.edge-preview .word,
    .focus-container.edge-preview .explains,
    .focus-container.edge-preview .actions,
    .focus-container.edge-preview .btn-close,
    .focus-container.edge-preview .btn-top,
    .focus-container.edge-preview .btn-edge,
    .focus-container.edge-preview .btn-list,
    .focus-container.edge-preview .opacity-bar,
    .focus-container.edge-preview .counter {
      opacity: 1;
      pointer-events: auto;
    }


    .counter {
      position: absolute;
      bottom: 2px;
      right: 6px;
      font-size: 10px;
      color: var(--text-quaternary);
      transition: color 0.3s ease;
    }

    /* 透明度滑条 */
    .opacity-bar {
      position: absolute;
      bottom: 2px;
      left: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-app-region: no-drag;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .focus-container:hover .opacity-bar {
      opacity: 1;
    }

    .opacity-bar svg {
      width: 10px;
      height: 10px;
      fill: var(--text-quaternary);
      flex-shrink: 0;
    }

    .opacity-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 3px;
      border-radius: 2px;
      background: var(--border-color);
      outline: none;
      cursor: pointer;
    }

    .opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-tertiary);
      cursor: pointer;
      transition: background 0.2s;
    }

    .opacity-slider:hover::-webkit-slider-thumb {
      background: var(--primary-color);
    }

    .opacity-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-tertiary);
      cursor: pointer;
      border: none;
    }

    .opacity-slider::-moz-range-track {
      height: 3px;
      border-radius: 2px;
      background: var(--border-color);
    }

  </style>
</head>
<body>
  <div class="focus-container" id="app">
    <div class="word" id="word">加载中...</div>
    <div class="explains" id="explains"></div>

    <div class="actions">
      <!-- 上一个 -->
      <span class="icon" id="btn-prev" title="上一个">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </span>
      <!-- 显示/隐藏释义 -->
      <span class="icon" id="btn-toggle" title="显示/隐藏释义">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      </span>
      <!-- 播放发音 -->
      <span class="icon" id="btn-play" title="播放发音">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </span>
      <!-- 忘记 -->
      <span class="icon icon-forgot" id="btn-forgot" title="忘记">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </span>
      <!-- 记得 -->
      <span class="icon icon-remember" id="btn-remember" title="记得">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </span>
      <!-- 下一个 -->
      <span class="icon" id="btn-next" title="下一个">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
      </span>
    </div>

    <!-- 关闭 -->
    <span class="icon btn-close" id="btn-close" title="关闭">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </span>
    <!-- 置顶 -->
    <span class="icon btn-top" id="btn-top" title="取消置顶">
      <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    </span>
    <!-- 贴边隐藏 -->
    <span class="icon btn-edge" id="btn-edge" title="关闭贴边隐藏">
      <svg viewBox="0 0 24 24"><path d="M5 5h2v14H5V5zm4 1h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm1 2v8h8V8h-8z"/></svg>
    </span>
    <!-- 返回列表 -->
    <span class="icon btn-list" id="btn-list" title="返回列表">
      <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    </span>

    <!-- 透明度滑条 -->
    <div class="opacity-bar">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3-8c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/></svg>
      <input type="range" class="opacity-slider" id="opacity-slider" min="30" max="100" value="100">
    </div>
    <div class="counter" id="counter">0/0</div>

    <!-- 贴边悬浮球 -->
    <div class="edge-bubble left" id="edge-bubble-left" title="悬浮展开">
      <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
    </div>
    <div class="edge-bubble right" id="edge-bubble-right" title="悬浮展开">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </div>

  </div>

  <script>
    // 状态
    let words = [];
    let currentIndex = 0;
    let showExplains = false;
    const FOCUS_MODE_ACTION_STORAGE_KEY = 'slowly-record-focus-mode-action';

    // 词库分片相关常量
    const WORDBANK_CHUNK_PREFIX = 'slowly-record-wordbank-chunk-v2:';
    const CURRENT_WORDBANK_KEY = 'slowly-record-current-wordbank';

    // 当前词库ID（从URL参数获取）
    let currentBankId = '';

    function getWordBankChunkId(bankId, chunkIndex) {
      return WORDBANK_CHUNK_PREFIX + bankId + ':' + chunkIndex;
    }

    // 从词库分片读取所有单词
    function getWordBankWords(bankId) {
      const allWords = [];
      if (typeof utools === 'undefined' || !utools.db) return allWords;
      try {
        for (let i = 0; i < 100; i++) {
          const docId = getWordBankChunkId(bankId, i);
          const doc = utools.db.get(docId);
          if (doc && doc.type === 'wordbank-chunk' && doc.bankId === bankId) {
            allWords.push(...(doc.words || []));
          } else {
            break;
          }
        }
      } catch (e) {
        console.error('[专注模式] 读取词库分片失败:', e);
      }
      return allWords;
    }

    // 更新词库中的单个单词
    function updateWordInBank(bankId, word) {
      if (typeof utools === 'undefined' || !utools.db) return false;
      try {
        for (let i = 0; i < 100; i++) {
          const docId = getWordBankChunkId(bankId, i);
          const doc = utools.db.get(docId);
          if (!doc || doc.type !== 'wordbank-chunk' || doc.bankId !== bankId) {
            break;
          }
          const wordIndex = doc.words.findIndex(function(w) { return w._id === word._id; });
          if (wordIndex !== -1) {
            doc.words[wordIndex] = word;
            doc.updatedAt = Date.now();
            utools.db.put(doc);
            console.log('[专注模式] 词库分片已更新:', word.text, 'chunk:', i);
            return true;
          }
        }
      } catch (e) {
        console.error('[专注模式] 更新词库分片失败:', e);
      }
      return false;
    }

    // DOM 元素
    const elWord = document.getElementById('word');
    const elExplains = document.getElementById('explains');
    const elCounter = document.getElementById('counter');
    const elBtnPrev = document.getElementById('btn-prev');
    const elBtnNext = document.getElementById('btn-next');
    const elBtnToggle = document.getElementById('btn-toggle');
    const btnEdge = document.getElementById('btn-edge');


    // 数据库 key
    const DB_KEY = 'words-list';

    // 加载数据
    async function loadWords() {
      try {
        if (typeof utools !== 'undefined') {
          // 优先从当前词库分片加载单词
          if (currentBankId) {
            console.log('[专注模式] 从词库分片加载:', currentBankId);
            const bankWords = getWordBankWords(currentBankId);
            if (bankWords.length > 0) {
              // 应用筛选条件后显示
              words = applyFilters(bankWords);
              console.log('[专注模式] 词库共', bankWords.length, '个单词，筛选后:', words.length);
            }
          }

          // 如果词库为空或没有 bankId，回退到旧数据库方式加载
          if (words.length === 0 && currentBankId) {
            // 词库存在但筛选后为空
            console.log('[专注模式] 词库存在但筛选后无匹配单词');
          } else if (words.length === 0) {
            console.log('[专注模式] 词库为空或未设置，回退到旧数据库加载');
            let allDocs = [];
            try {
              allDocs = utools.db.allDocs('words-list');
            } catch (e) {
              allDocs = utools.db.allDocs();
            }
            words = applyFilters(allDocs);
          }
        }

        if (words.length === 0) {
          elWord.textContent = '暂无待复习单词';
          elCounter.textContent = '0/0';
          return;
        }

        updateDisplay();
      } catch (e) {
        console.error('加载失败:', e);
        elWord.textContent = '加载失败';
      }
    }

    // 更新显示
    function updateDisplay() {
      const word = words[currentIndex];
      if (!word) return;

      elWord.textContent = word.text || '无';
      elCounter.textContent = `${currentIndex + 1}/${words.length}`;

      if (showExplains && word.explains) {
        elExplains.textContent = Array.isArray(word.explains)
          ? word.explains.join('; ')
          : word.explains;
        elExplains.style.display = 'block';
        // 隐藏图标 (眼睛带斜杠)
        elBtnToggle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>';
      } else {
        elExplains.style.display = 'none';
        // 显示图标 (眼睛)
        elBtnToggle.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
      }

      elBtnPrev.classList.toggle('disabled', currentIndex <= 0);
      elBtnNext.classList.toggle('disabled', currentIndex >= words.length - 1);

      // 自动发音：切换到新单词时自动播放（避免同一单词重复播放）
      if (autoSpeakEnabled && word.text !== lastAutoSpeakWord) {
        lastAutoSpeakWord = word.text;
        playAudio();
      }
    }

    // 播放发音
    async function playAudio() {
      const word = words[currentIndex];
      if (!word) return;
      try {
        const audio = new Audio();
        audio.src = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word.text)}&type=1`;
        await audio.play();
      } catch (e) {
        console.error('播放失败:', e);
      }
    }

    // 通知主窗口单词发生了变化
    function postWordChanged(word) {
      // 通过 storage 事件通知主窗口
      try {
        var action = {
          type: 'wordChanged',
          payload: { word: JSON.parse(JSON.stringify(word)) },
          at: Date.now()
        };
        localStorage.setItem(FOCUS_MODE_ACTION_STORAGE_KEY, JSON.stringify(action));
      } catch (e) {
        console.error('[专注模式] 发送单词变更通知失败:', e);
      }

      // 通过 utools 直接通信
      if (typeof utools !== 'undefined' && utools.sendToParent) {
        try {
          utools.sendToParent('wordChanged', { word: JSON.parse(JSON.stringify(word)) });
        } catch (e) {
          console.error('[专注模式] 通过 utools 发送通知失败:', e);
        }
      }
    }

    // 判断当前单词是否应该保留在当前列表模式中
    // listMode 与主窗口一致: 0=待复习(isReview), 1=已复习(!isReview,含已记住), 2=已记住(remember), 3=全部
    function shouldKeepInList(word) {
      if (currentListMode === 3) return true;
      if (currentListMode === 2) return !!word.remember;
      if (currentListMode === 1) return !word.isReview;
      return !!word.isReview;  // 默认0：待复习
    }

    // 标记记得
    function markRemembered() {
      var word = words[currentIndex];
      if (!word) return;

      word.level = Math.min(7, (word.level || 1) + 1);
      word.isReview = word.level < 7;
      if (word.level >= 7) word.remember = true;
      word.learnDate = new Date();

      // 保存到旧数据库（兼容）
      if (typeof utools !== 'undefined') utools.db.put(word);

      // 同步更新到词库分片
      if (currentBankId) {
        updateWordInBank(currentBankId, word);
      }

      // 通知主窗口同步
      postWordChanged(word);

      // 如果单词不再符合当前列表模式筛选条件，从列表中移除
      if (!shouldKeepInList(word)) {
        words.splice(currentIndex, 1);
        if (currentIndex >= words.length) currentIndex = Math.max(0, words.length - 1);
      }

      updateDisplay();

      if (currentIndex < words.length - 1) {
        setTimeout(function() { currentIndex++; updateDisplay(); }, 200);
      }
    }

    // 标记忘记
    function markForgot() {
      var word = words[currentIndex];
      if (!word) return;

      word.level = Math.max(1, (word.level || 1) - 1);
      word.isReview = true;

      // 保存到旧数据库（兼容）
      if (typeof utools !== 'undefined') utools.db.put(word);

      // 同步更新到词库分片
      if (currentBankId) {
        updateWordInBank(currentBankId, word);
      }

      // 通知主窗口同步
      postWordChanged(word);

      // 如果单词不再符合当前列表模式筛选条件，从列表中移除（例如：在"已记住"模式下标记忘记）
      if (!shouldKeepInList(word)) {
        words.splice(currentIndex, 1);
        if (currentIndex >= words.length) currentIndex = Math.max(0, words.length - 1);
      }

      updateDisplay();

      if (currentIndex < words.length - 1) {
        setTimeout(function() { currentIndex++; updateDisplay(); }, 200);
      }
    }

    // 事件监听
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; showExplains = false; updateDisplay(); }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentIndex < words.length - 1) { currentIndex++; showExplains = false; updateDisplay(); }
    });

    document.getElementById('btn-toggle').addEventListener('click', () => { showExplains = !showExplains; updateDisplay(); });
    document.getElementById('btn-play').addEventListener('click', playAudio);
    document.getElementById('btn-remember').addEventListener('click', markRemembered);
    document.getElementById('btn-forgot').addEventListener('click', markForgot);
    document.getElementById('btn-close').addEventListener('click', () => window.close());

    // 置顶/贴边隐藏按钮
    let isAlwaysOnTop = true;
    let isEdgeStickEnabled = true;
    let lastRestoreRequestAt = 0;

    const btnTop = document.getElementById('btn-top');
    btnTop.classList.add('active');
    btnEdge.classList.add('active');

    function getFocusWindowState() {
      return {
        currentIndex: currentIndex,
        showExplains: showExplains,
        opacity: currentOpacity,
        edgeStickEnabled: isEdgeStickEnabled,
      };
    }

    function updateTopButton() {
      btnTop.classList.toggle('active', isAlwaysOnTop);
      btnTop.title = isAlwaysOnTop ? '取消置顶' : '置顶';
    }

    function updateEdgeStickButton() {
      btnEdge.classList.toggle('active', isEdgeStickEnabled);
      btnEdge.title = isEdgeStickEnabled ? '关闭贴边隐藏' : '开启贴边隐藏';
    }

    function postFocusModeAction(channel, payload, options = {}) {
      const { persistPendingAction = false, persistStorageAction = true } = options;
      const actionAt = Date.now();
      const action = { type: channel, payload, at: actionAt };

      if (persistPendingAction) {
        saveFocusModePendingAction(channel, payload, actionAt);
      }

      if (persistStorageAction) {
        try {
          localStorage.setItem(FOCUS_MODE_ACTION_STORAGE_KEY, JSON.stringify(action));
        } catch (e) {
          console.error('[专注模式] 写入本地动作失败:', channel, e);
        }
      }

      if (typeof utools !== 'undefined' && utools.sendToParent) {
        utools.sendToParent({ channel, payload });
        try {
          utools.sendToParent(channel, payload);
        } catch (e) {}
      } else {
        console.warn('[专注模式] utools.sendToParent 不可用，已使用本地动作兜底:', channel, payload);
      }

      return actionAt;
    }

    // 设置置顶状态 - 优先通知父窗口直接更新当前 BrowserWindow，兼容旧消息格式
    function setWindowAlwaysOnTop(value) {
      console.log('[专注模式] setWindowAlwaysOnTop 被调用:', value);
      const messageData = {
        ...getFocusWindowState(),
        alwaysOnTop: value,
      };
      console.log('[专注模式] 发送数据:', messageData);
      postFocusModeAction('setAlwaysOnTop', messageData);
      console.log('[专注模式] 消息已发送');
    }


    function setEdgeStickEnabled(value, options = {}) {
      const { persist = true, notifyParent = true, showTip = true } = options;
      isEdgeStickEnabled = value;
      updateEdgeStickButton();

      if (persist) {
        saveFocusModeSetting('edgeStickEnabled', value);
      }

      if (notifyParent) {
        const messageData = {
          ...getFocusWindowState(),
          edgeStickEnabled: value,
          alwaysOnTop: isAlwaysOnTop,
        };
        postFocusModeAction('setEdgeStickEnabled', messageData);
      }


      if (showTip) {
        showToast(value ? '已开启贴边隐藏' : '已关闭贴边隐藏');
      }
    }

    function requestRestoreFromEdge(reason = 'hover') {
      const now = Date.now();
      if (now - lastRestoreRequestAt < 200) {
        return;
      }
      lastRestoreRequestAt = now;

      console.log('[专注模式] 请求恢复窗口，原因:', reason);
      postFocusModeAction('restoreFromEdge', { reason }, { persistPendingAction: true });
    }



    btnTop.addEventListener('click', () => {
      isAlwaysOnTop = !isAlwaysOnTop;
      updateTopButton();
      saveFocusModeSetting('alwaysOnTop', isAlwaysOnTop);
      setWindowAlwaysOnTop(isAlwaysOnTop);
    });

    btnEdge.addEventListener('click', () => {
      setEdgeStickEnabled(!isEdgeStickEnabled);
    });



    // 返回列表按钮 - 优先通知父窗口，同时直接唤起主窗口作为兜底
    document.getElementById('btn-list').addEventListener('click', () => {
      // 先保存当前数据状态到词库和旧数据库，确保主窗口能获取最新数据
      try {
        if (words.length > 0 && currentIndex < words.length) {
          const currentWord = words[currentIndex];
          if (currentWord && currentWord._id) {
            utools.db.put(currentWord);
            // 同时保存到词库分片
            if (currentBankId) {
              updateWordInBank(currentBankId, currentWord);
            }
          }
        }
      } catch (e) {
        console.error('保存当前单词状态失败:', e);
      }

      postFocusModeAction('openWordList', undefined, { persistPendingAction: true });


      try {
        if (typeof utools !== 'undefined' && utools.showMainWindow) {
          utools.showMainWindow();
        }
      } catch (e) {
        console.error('[专注模式] 显示主窗口失败:', e);
      }

      setTimeout(() => {
        window.close();
      }, 100);
    });


    // ========== 透明度设置 ==========
    let currentOpacity = 1.0;
    const opacitySlider = document.getElementById('opacity-slider');

    // 当前主题是否为暗黑模式
    const isDarkMode = document.documentElement.classList.contains('dark-theme');

    function applyOpacity(opacity) {
      const validOpacity = Math.max(0.3, Math.min(1.0, parseFloat(opacity) || 1.0));
      currentOpacity = validOpacity;

      // 获取当前实际主题（动态检测）
      const isDark = document.documentElement.classList.contains('dark-theme') ||
                     document.body.classList.contains('dark-theme');

      // 使用 rgba 背景实现真正透明（需配合 transparent: true）
      const bgR = isDark ? 30 : 255;
      const bgG = isDark ? 30 : 255;
      const bgB = isDark ? 30 : 255;

      // html 和 body 保持透明，只设置容器背景
      document.documentElement.style.background = 'transparent';
      document.body.style.background = 'transparent';

      // 设置 app 容器背景，这是实际显示背景的地方
      const appContainer = document.getElementById('app');
      if (appContainer) {
        appContainer.style.background = `rgba(${bgR}, ${bgG}, ${bgB}, ${validOpacity})`;
      }

      // 同步滑条
      if (opacitySlider) {
        opacitySlider.value = Math.round(validOpacity * 100);
      }

      console.log('透明度已应用:', validOpacity, '主题:', isDark ? 'dark' : 'light');
    }

    // 滑条调节透明度
    if (opacitySlider) {
      opacitySlider.addEventListener('input', (e) => {
        const value = parseInt(e.target.value);
        const opacity = value / 100;
        applyOpacity(opacity);
        saveFocusModeSetting('opacity', opacity);
      });
    }

    // 通过 Ctrl+滚轮调节透明度
    document.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.05 : 0.05;
        const newOpacity = Math.max(0.3, Math.min(1.0, currentOpacity + delta));
        applyOpacity(newOpacity);
        saveFocusModeSetting('opacity', newOpacity);
        showToast(Math.round(newOpacity * 100) + '%');
      }
    }, { passive: false });

    // ========== 贴边隐藏 ==========
    const appContainer = document.getElementById('app');
    const edgeBubbleLeft = document.getElementById('edge-bubble-left');
    const edgeBubbleRight = document.getElementById('edge-bubble-right');

    let isEdgeStuck = false;
    let edgeSide = null;
    let isEdgePreview = false;
    let edgePreviewOpenedAt = 0;
    let hoverExpandTimer = null;
    let hoverCollapseTimer = null;


    function clearEdgeHoverTimers() {
      clearTimeout(hoverExpandTimer);
      clearTimeout(hoverCollapseTimer);
      hoverExpandTimer = null;
      hoverCollapseTimer = null;
    }

    function requestExpandFromEdge(reason = 'hover') {
      if (!isEdgeStuck) {
        return;
      }

      postFocusModeAction('expandFromEdge', { reason }, { persistPendingAction: true });
    }

    function requestCollapseToEdge(reason = 'mouseleave') {
      if (!isEdgeStuck || !isEdgePreview) {
        return;
      }

      postFocusModeAction('collapseToEdge', { reason }, { persistPendingAction: true });
    }


    function scheduleCollapseToEdge(delay = 180) {
      if (!isEdgePreview) {
        return;
      }

      const previewVisibleFor = Date.now() - edgePreviewOpenedAt;
      const minPreviewDuration = 220;
      const actualDelay = Math.max(delay, minPreviewDuration - previewVisibleFor, 0);

      clearTimeout(hoverCollapseTimer);
      hoverCollapseTimer = setTimeout(() => {
        requestCollapseToEdge('mouseleave');
      }, actualDelay);
    }


    // 更新贴边状态（供父窗口调用）
    window.updateEdgeStuckState = function(stuck, side, expanded = false) {
      console.log('[专注模式] 更新贴边状态:', stuck, side, expanded);
      isEdgeStuck = stuck;
      edgeSide = side || null;
      isEdgePreview = !!expanded;
      edgePreviewOpenedAt = stuck && expanded ? Date.now() : 0;
      clearEdgeHoverTimers();


      if (appContainer) {
        appContainer.classList.toggle('edge-hidden', stuck && !expanded);
        appContainer.classList.toggle('edge-preview', stuck && expanded);
      }

      if (edgeBubbleLeft) {
        edgeBubbleLeft.classList.toggle('visible', stuck && side === 'left' && !expanded);
      }
      if (edgeBubbleRight) {
        edgeBubbleRight.classList.toggle('visible', stuck && side === 'right' && !expanded);
      }

      if (!stuck) {
        isEdgePreview = false;
      }
    };

    function bindEdgeBubble(bubble, side) {
      if (!bubble) return;

      bubble.addEventListener('mouseenter', () => {
        clearTimeout(hoverCollapseTimer);
        hoverExpandTimer = setTimeout(() => {
          requestExpandFromEdge(`bubble-hover-${side}`);
        }, 60);
      });

      bubble.addEventListener('mouseleave', () => {
        clearTimeout(hoverExpandTimer);
      });


      bubble.addEventListener('click', (e) => {
        e.stopPropagation();
        requestRestoreFromEdge(`bubble-click-${side}`);
      });
    }

    bindEdgeBubble(edgeBubbleLeft, 'left');
    bindEdgeBubble(edgeBubbleRight, 'right');

    if (appContainer) {
      appContainer.addEventListener('mouseenter', () => {
        if (isEdgePreview) {
          clearTimeout(hoverCollapseTimer);
        }
      });

      appContainer.addEventListener('mouseleave', () => {
        if (isEdgePreview) {
          scheduleCollapseToEdge(220);
        }
      });
    }







    // ========== Toast 提示 ==========
    function showToast(message) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);' +
          'background:rgba(0,0,0,0.7);color:#fff;padding:4px 12px;border-radius:4px;font-size:12px;' +
          'z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;-webkit-app-region:no-drag;';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.style.opacity = '1';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 800);
    }

    // ========== 保存/读取设置 ==========
    function getUserSetDoc() {
      if (typeof utools === 'undefined' || !utools.db) {
        return null;
      }

      const docs = utools.db.allDocs('user-set');
      return docs.find(doc => doc && doc._id && doc._id.startsWith('user-set')) || null;
    }

    function saveFocusModeSetting(key, value) {
      try {
        const userSetDoc = getUserSetDoc();
        if (userSetDoc) {
          if (!userSetDoc.focusMode) userSetDoc.focusMode = {};
          userSetDoc.focusMode[key] = value;
          const result = utools.db.put(userSetDoc);
          console.log('[专注模式] 保存设置结果:', key, value, result);
        } else {
          console.warn('[专注模式] 未找到 user-set 配置文档，保存失败');
        }
      } catch (e) {
        console.error('保存设置失败:', e);
      }
    }

    function saveFocusModePendingAction(type, payload, at = Date.now()) {
      try {
        const userSetDoc = getUserSetDoc();
        if (!userSetDoc) {
          return;
        }

        if (!userSetDoc.focusMode) userSetDoc.focusMode = {};
        userSetDoc.focusMode.pendingAction = {
          type,
          payload,
          at,
        };
        utools.db.put(userSetDoc);
      } catch (e) {
        console.error('[专注模式] 保存待处理动作失败:', e);
      }
    }



    function loadFocusModeSettings() {
      try {
        const userSetDoc = getUserSetDoc();

        if (userSetDoc && userSetDoc.focusMode) {
          const fm = userSetDoc.focusMode;

          // 应用透明度
          if (fm.opacity !== undefined) {
            applyOpacity(fm.opacity);
          }

          if (typeof fm.edgeStickEnabled === 'boolean') {
            setEdgeStickEnabled(fm.edgeStickEnabled, {
              persist: false,
              notifyParent: false,
              showTip: false,
            });
          } else {
            updateEdgeStickButton();
          }

          // 置顶状态以父窗口创建时传入的 URL 参数为准，仅更新按钮显示，避免启动时把新状态回写成旧值
          updateTopButton();

          return fm;
        }
      } catch (e) {
        console.error('读取专注模式设置失败:', e);
      }
      updateTopButton();
      updateEdgeStickButton();
      return null;
    }



    // ========== 键盘快捷键 ==========
    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'R') { e.preventDefault(); markRemembered(); }
      else if (e.shiftKey && e.key === 'F') { e.preventDefault(); markForgot(); }
      else if (e.shiftKey && e.key === 'P') { e.preventDefault(); playAudio(); }
      else if (e.shiftKey && e.key === 'T') { e.preventDefault(); showExplains = !showExplains; updateDisplay(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); if (currentIndex > 0) { currentIndex--; showExplains = false; updateDisplay(); } }
      else if (e.key === 'ArrowRight') { e.preventDefault(); if (currentIndex < words.length - 1) { currentIndex++; showExplains = false; updateDisplay(); } }
      else if (e.key === 'Escape') { e.preventDefault(); window.close(); }
    });

    // ========== 主题 ==========
    function applyTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add('dark-theme');
        document.body.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
        document.body.classList.remove('dark-theme');
      }
      // 主题变化后重新应用透明度，确保使用正确的背景色
      if (currentOpacity !== undefined) {
        applyOpacity(currentOpacity);
      }
    }

    function getThemeFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const theme = urlParams.get('theme');
      if (theme === 'dark') return true;
      if (theme === 'light') return false;
      return null;
    }

    function detectTheme() {
      const urlTheme = getThemeFromUrl();
      if (urlTheme !== null) return urlTheme;

      let isDark = document.body.classList.contains('utools-dark') ||
                   document.documentElement.classList.contains('utools-dark');

      if (!isDark && typeof utools !== 'undefined' && utools.isDark) {
        isDark = utools.isDark();
      }

      return isDark;
    }

    const isDark = detectTheme();
    applyTheme(isDark);

    // 从 URL 参数获取状态
    function getStateFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const index = parseInt(urlParams.get('index') || '0');
      const showExplainsParam = urlParams.get('showExplains') === 'true';
      const opacity = parseFloat(urlParams.get('opacity') || '1.0');
      // alwaysOnTop 默认为 true，除非显式指定为 'false'
      const alwaysOnTopParam = urlParams.get('alwaysOnTop');
      const alwaysOnTop = alwaysOnTopParam === 'false' ? false : true;
      const edgeStickEnabledParam = urlParams.get('edgeStickEnabled');
      const edgeStickEnabled = edgeStickEnabledParam === 'false' ? false : true;
      const bankId = urlParams.get('bankId') || '';

      // 筛选参数
      const listMode = parseInt(urlParams.get('listMode') || '0');
      const pattern = urlParams.get('pattern') || '';
      const minLen = parseInt(urlParams.get('minLen') || '0');
      const maxLen = parseInt(urlParams.get('maxLen') || '0');
      const sortBy = urlParams.get('sortBy') || '';
      const sortAsc = urlParams.get('sortAsc') !== '0';

      // 自动发音设置
      const autoSpeakParam = urlParams.get('autoSpeak');
      const autoSpeak = autoSpeakParam === '1' ? true : (autoSpeakParam === '0' ? false : false);

      return {
        currentIndex: isNaN(index) ? 0 : index,
        showExplains: showExplainsParam,
        opacity: isNaN(opacity) ? 1.0 : opacity,
        alwaysOnTop: alwaysOnTop,
        edgeStickEnabled: edgeStickEnabled,
        bankId: bankId,
        listMode: listMode,
        pattern: pattern,
        minLen: isNaN(minLen) ? 0 : minLen,
        maxLen: isNaN(maxLen) ? 0 : maxLen,
        sortBy: sortBy,
        sortAsc: sortAsc,
        autoSpeak: autoSpeak,
      };
    }

    // 筛选状态（从URL参数初始化）
    let currentListMode = 0;
    let currentPattern = '';
    let currentMinLen = 0;
    let currentMaxLen = 0;
    let currentSortBy = '';
    let currentSortAsc = true;

    // 自动发音开关
    let autoSpeakEnabled = false;
    let lastAutoSpeakWord = '';  // 记录上次自动发音的单词，避免重复播放

    // 通配符模式转正则
    function patternToRegex(pattern) {
      if (!pattern || !pattern.trim()) return null;
      var trimmed = pattern.trim();
      try {
        if (trimmed.indexOf('*') !== -1) {
          var escaped = trimmed.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*');
          return new RegExp('^' + escaped + '$', 'i');
        }
        return new RegExp(escapedPattern(trimmed), 'i');
      } catch (e) {
        console.error('[专注模式] 正则转换失败:', e);
        return null;
      }
    }

    function escapedPattern(text) {
      return text.replace(/[.+^${}()|[\]\\]/g, '\\$&');
    }

    // 对单词列表应用筛选
    function applyFilters(wordList) {
      var list = wordList.slice();

      // 1. listMode 筛选（与主窗口 showFilteredWords 一致）
      // 0=待复习(isReview), 1=已复习(!isReview,含已记住), 2=已记住(remember), 3=全部
      if (currentListMode === 2) {
        list = list.filter(function(w) { return w.remember; });
      } else if (currentListMode === 1) {
        list = list.filter(function(w) { return !w.isReview; });
      } else if (currentListMode === 3) {
        // 全部显示
      } else {
        // 默认0：待复习
        list = list.filter(function(w) { return w.isReview; });
      }

      // 2. 长度筛选
      if (currentMinLen > 0 || currentMaxLen > 0) {
        list = list.filter(function(item) {
          var len = (item.text || '').replace(/\s+/g, '').length;
          if (currentMinLen > 0 && len < currentMinLen) return false;
          if (currentMaxLen > 0 && len > currentMaxLen) return false;
          return true;
        });
      }

      // 3. 通配符模式筛选
      var regex = patternToRegex(currentPattern);
      if (regex) {
        list = list.filter(function(item) {
          return regex.test((item.text || '').replace(/\s+/g, ''));
        });
      }

      // 4. 排序
      if (currentSortBy) {
        var dir = currentSortAsc ? 1 : -1;
        list = list.sort(function(a, b) {
          switch (currentSortBy) {
            case 'alpha':
              return dir * (a.text || '').localeCompare(b.text || '', 'en');
            case 'length':
              return dir * ((a.text || '').length - (b.text || '').length);
            case 'time':
              return dir * (new Date(a.ctime || 0).getTime() - new Date(b.ctime || 0).getTime());
            case 'level':
              return dir * ((a.level || 0) - (b.level || 0));
            default:
              return 0;
          }
        });
      }

      return list;
    }

    // 初始化
    const initialState = getStateFromUrl();
    console.log('从 URL 恢复状态:', initialState);

    // 应用恢复的状态
    currentIndex = initialState.currentIndex;
    showExplains = initialState.showExplains;
    currentOpacity = initialState.opacity;
    isAlwaysOnTop = initialState.alwaysOnTop;
    isEdgeStickEnabled = initialState.edgeStickEnabled;
    currentBankId = initialState.bankId;
    currentListMode = initialState.listMode;
    currentPattern = initialState.pattern;
    currentMinLen = initialState.minLen;
    currentMaxLen = initialState.maxLen;
    currentSortBy = initialState.sortBy;
    currentSortAsc = initialState.sortAsc;
    autoSpeakEnabled = initialState.autoSpeak;
    console.log('[专注模式] 当前词库ID:', currentBankId || '(未设置，将使用旧数据库)');
    console.log('[专注模式] 筛选参数: listMode=' + currentListMode + ', pattern=' + currentPattern + ', minLen=' + currentMinLen + ', maxLen=' + currentMaxLen + ', sortBy=' + currentSortBy + ', autoSpeak=' + autoSpeakEnabled);

    updateTopButton();
    updateEdgeStickButton();

    loadWords();
    loadFocusModeSettings();


    // 如果 URL 中有透明度参数，应用它
    if (initialState.opacity !== undefined && initialState.opacity !== 1.0) {
      applyOpacity(initialState.opacity);
    }
  </script>
</body>
