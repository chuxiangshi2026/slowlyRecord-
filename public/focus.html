<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专注模式</title>
  <style>
    /* Iconfont 字体 */
    @font-face {
      font-family: "iconfont";
      src: url('../src/assets/icons/iconfont.woff2?t=1763429391127') format('woff2'),
           url('../src/assets/icons/iconfont.woff?t=1763429391127') format('woff'),
           url('../src/assets/icons/iconfont.ttf?t=1763429391127') format('truetype');
    }

    .iconfont {
      font-family: "iconfont" !important;
      font-size: 16px;
      font-style: normal;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .icon-lock:before { content: "\e676"; }
    .icon-top:before { content: "\e681"; }
    .icon-card:before { content: "\e61a"; }
    .icon-close:before { content: "\e616"; }
    .icon-left:before { content: "\e612"; }
    .icon-right:before { content: "\e613"; }
    .icon-visible:before { content: "\e7ec"; }
    .icon-invisible:before { content: "\e64e"; }
    .icon-player:before { content: "\e60b"; }
    .icon-check:before { content: "\e861"; }
    .icon-delete:before { content: "\e60e"; }
  </style>
  <style>
    /* CSS 变量定义 */
    :root {
      /* 亮色主题 (默认) */
      --bg-primary: #ffffff;
      --text-primary: #262626;
      --text-secondary: #595959;
      --text-tertiary: #8c8c8c;
      --text-quaternary: #bfbfbf;
      --border-color: #d9d9d9;
      --primary-color: #409eff;
      --danger-color: #f56c6c;
      --success-color: #67c23a;
    }

    /* 暗黑主题 */
    .dark-theme,
    html.utools-dark,
    body.utools-dark {
      --bg-primary: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-tertiary: #808080;
      --text-quaternary: #606060;
      --border-color: #3e3e42;
      --primary-color: #5b8cff;
      --danger-color: #e57373;
      --success-color: #81c784;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      transition: background-color 0.3s ease;
    }

    .focus-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      position: relative;
      /* 允许拖拽移动窗口 */
      -webkit-app-region: drag;
    }

    /* 按钮区域不响应拖拽，允许点击 */
    .actions, .btn-close, .counter {
      -webkit-app-region: no-drag;
    }

    .word {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
      text-align: center;
      user-select: none;
      transition: color 0.3s ease;
    }

    .explains {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 6px;
      max-width: 95%;
      line-height: 1.3;
      user-select: none;
      transition: color 0.3s ease;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .actions .iconfont {
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px;
      transition: opacity 0.15s, color 0.3s ease;
    }

    .actions .iconfont:hover:not(.disabled) {
      opacity: 0.6;
    }

    .actions .iconfont.disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .actions .icon-delete {
      color: var(--text-tertiary);
    }

    .actions .icon-delete:hover:not(.disabled) {
      color: var(--danger-color);
    }

    .actions .icon-check {
      color: var(--success-color);
      font-weight: bold;
    }

    .btn-close {
      position: absolute;
      top: 2px;
      right: 6px;
      font-size: 12px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-close:hover {
      color: var(--text-primary);
    }

    .btn-top {
      position: absolute;
      top: 2px;
      right: 26px;
      font-size: 12px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-top:hover {
      color: var(--primary-color);
    }

    .btn-top.active {
      color: var(--primary-color);
    }

    .btn-list {
      position: absolute;
      top: 2px;
      right: 46px;
      font-size: 12px;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      transition: color 0.3s ease;
      -webkit-app-region: no-drag;
    }

    .btn-list:hover {
      color: var(--primary-color);
    }

    .counter {
      position: absolute;
      bottom: 2px;
      right: 6px;
      font-size: 10px;
      color: var(--text-quaternary);
      transition: color 0.3s ease;
    }

  </style>
</head>
<body>
  <div class="focus-container" id="app">
    <div class="word" id="word">加载中...</div>
    <div class="explains" id="explains"></div>

    <div class="actions">
      <i class="iconfont icon-left" id="btn-prev" title="上一个"></i>
      <i class="iconfont icon-visible" id="btn-toggle" title="显示/隐藏释义"></i>
      <i class="iconfont icon-player" id="btn-play" title="播放发音"></i>
      <i class="iconfont icon-delete" id="btn-forgot" title="忘记"></i>
      <i class="iconfont icon-check" id="btn-remember" title="记得"></i>
      <i class="iconfont icon-right" id="btn-next" title="下一个"></i>
    </div>

    <i class="iconfont icon-close btn-close" id="btn-close" title="关闭"></i>
    <i class="iconfont icon-top btn-top" id="btn-top" title="取消置顶"></i>
    <i class="iconfont icon-card btn-list" id="btn-list" title="返回列表"></i>
    <div class="counter" id="counter">0/0</div>
  </div>

  <script>
    // 状态
    let words = [];
    let currentIndex = 0;
    let showExplains = false;

    // DOM 元素
    const elWord = document.getElementById('word');
    const elExplains = document.getElementById('explains');
    const elCounter = document.getElementById('counter');
    const elBtnPrev = document.getElementById('btn-prev');
    const elBtnNext = document.getElementById('btn-next');
    const elBtnToggle = document.getElementById('btn-toggle');

    // 数据库 key
    const DB_KEY = 'words-list';

    // 加载数据
    async function loadWords() {
      try {
        if (typeof utools !== 'undefined') {
          let allDocs = [];
          try {
            allDocs = utools.db.allDocs(DB_KEY);
          } catch (e) {
            allDocs = utools.db.allDocs();
          }
          words = allDocs.filter(w => w.isReview === true);
        }

        if (words.length === 0) {
          elWord.textContent = '暂无待复习单词';
          elCounter.textContent = '0/0';
          return;
        }

        updateDisplay();
      } catch (e) {
        console.error('加载失败:', e);
        elWord.textContent = '加载失败';
      }
    }

    // 更新显示
    function updateDisplay() {
      const word = words[currentIndex];
      if (!word) return;

      elWord.textContent = word.text || '无';
      elCounter.textContent = `${currentIndex + 1}/${words.length}`;

      if (showExplains && word.explains) {
        elExplains.textContent = Array.isArray(word.explains)
          ? word.explains.join('; ')
          : word.explains;
        elExplains.style.display = 'block';
        elBtnToggle.className = 'iconfont icon-invisible';
      } else {
        elExplains.style.display = 'none';
        elBtnToggle.className = 'iconfont icon-visible';
      }

      elBtnPrev.classList.toggle('disabled', currentIndex <= 0);
      elBtnNext.classList.toggle('disabled', currentIndex >= words.length - 1);
    }

    // 播放发音
    async function playAudio() {
      const word = words[currentIndex];
      if (!word) return;
      try {
        const audio = new Audio();
        audio.src = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word.text)}&type=1`;
        await audio.play();
      } catch (e) {
        console.error('播放失败:', e);
      }
    }

    // 标记记得
    function markRemembered() {
      const word = words[currentIndex];
      if (!word) return;

      word.level = Math.min(7, (word.level || 1) + 1);
      word.isReview = word.level < 7;
      if (word.level >= 7) word.remember = true;
      word.learnDate = new Date();

      if (typeof utools !== 'undefined') utools.db.put(word);

      if (!word.isReview) {
        words.splice(currentIndex, 1);
        if (currentIndex >= words.length) currentIndex = Math.max(0, words.length - 1);
      }

      updateDisplay();

      if (currentIndex < words.length - 1) {
        setTimeout(() => { currentIndex++; updateDisplay(); }, 200);
      }
    }

    // 标记忘记
    function markForgot() {
      const word = words[currentIndex];
      if (!word) return;

      word.level = Math.max(1, (word.level || 1) - 1);
      word.isReview = true;

      if (typeof utools !== 'undefined') utools.db.put(word);
      updateDisplay();

      if (currentIndex < words.length - 1) {
        setTimeout(() => { currentIndex++; updateDisplay(); }, 200);
      }
    }

    // 事件监听
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; showExplains = false; updateDisplay(); }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentIndex < words.length - 1) { currentIndex++; showExplains = false; updateDisplay(); }
    });

    document.getElementById('btn-toggle').addEventListener('click', () => { showExplains = !showExplains; updateDisplay(); });
    document.getElementById('btn-play').addEventListener('click', playAudio);
    document.getElementById('btn-remember').addEventListener('click', markRemembered);
    document.getElementById('btn-forgot').addEventListener('click', markForgot);
    document.getElementById('btn-close').addEventListener('click', () => window.close());

    // 置顶按钮
    let isAlwaysOnTop = true; // 默认置顶
    const btnTop = document.getElementById('btn-top');
    btnTop.classList.add('active'); // 初始状态为激活
    
    // 尝试多种方式设置置顶
    function setWindowAlwaysOnTop(value) {
      console.log('尝试设置置顶状态:', value);
      
      // 方式1: 通过 utools.sendToParent 发送消息给父窗口
      if (typeof utools !== 'undefined' && utools.sendToParent) {
        try {
          utools.sendToParent({ type: 'setAlwaysOnTop', value: value });
          console.log('方式1: sendToParent 发送成功');
        } catch (e) {
          console.error('方式1失败:', e);
        }
      }
      
      // 方式2: 尝试直接使用 Electron remote API (子窗口内)
      try {
        // @ts-ignore
        if (typeof require !== 'undefined') {
          // @ts-ignore
          const { remote } = require('electron');
          if (remote) {
            const currentWindow = remote.getCurrentWindow();
            if (currentWindow && typeof currentWindow.setAlwaysOnTop === 'function') {
              currentWindow.setAlwaysOnTop(value);
              console.log('方式2: remote.getCurrentWindow().setAlwaysOnTop 成功');
              return;
            }
          }
        }
      } catch (e) {
        console.log('方式2不可用:', e.message);
      }
      
      // 方式3: 尝试通过 window.opener 发送消息
      try {
        if (window.opener) {
          window.opener.postMessage({ type: 'setAlwaysOnTop', value: value }, '*');
          console.log('方式3: postMessage 发送成功');
        }
      } catch (e) {
        console.log('方式3不可用:', e.message);
      }
    }
    
    btnTop.addEventListener('click', () => {
      isAlwaysOnTop = !isAlwaysOnTop;
      btnTop.classList.toggle('active', isAlwaysOnTop);
      // 更新 title 提示
      btnTop.title = isAlwaysOnTop ? '取消置顶' : '置顶';
      console.log('置顶按钮点击，新状态:', isAlwaysOnTop);
      // 设置置顶状态
      setWindowAlwaysOnTop(isAlwaysOnTop);
    });

    // 返回列表按钮
    document.getElementById('btn-list').addEventListener('click', () => {
      // 发送消息给父窗口打开列表
      if (typeof utools !== 'undefined' && utools.sendToParent) {
        utools.sendToParent({ type: 'openWordList' });
      }
      // 关闭专注窗口
      window.close();
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key === 'R') { e.preventDefault(); markRemembered(); }
      else if (e.shiftKey && e.key === 'F') { e.preventDefault(); markForgot(); }
      else if (e.shiftKey && e.key === 'P') { e.preventDefault(); playAudio(); }
      else if (e.shiftKey && e.key === 'T') { e.preventDefault(); showExplains = !showExplains; updateDisplay(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); if (currentIndex > 0) { currentIndex--; showExplains = false; updateDisplay(); } }
      else if (e.key === 'ArrowRight') { e.preventDefault(); if (currentIndex < words.length - 1) { currentIndex++; showExplains = false; updateDisplay(); } }
      else if (e.key === 'Escape') { e.preventDefault(); window.close(); }
    });

    // 主题适配
    function applyTheme(isDark) {
      if (isDark) {
        document.documentElement.classList.add('dark-theme');
        document.body.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
        document.body.classList.remove('dark-theme');
      }
    }

    // 从 URL 参数获取主题
    function getThemeFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const theme = urlParams.get('theme');
      if (theme === 'dark') return true;
      if (theme === 'light') return false;
      return null;
    }

    // 从 uTools 获取主题
    function detectTheme() {
      // 优先使用 URL 参数
      const urlTheme = getThemeFromUrl();
      if (urlTheme !== null) {
        return urlTheme;
      }
      
      // 备用：检测 body/html 是否有 utools-dark 类
      let isDark = document.body.classList.contains('utools-dark') ||
                   document.documentElement.classList.contains('utools-dark');
      
      // 备用：使用 uTools API
      if (!isDark && typeof utools !== 'undefined' && utools.isDark) {
        isDark = utools.isDark();
      }
      
      return isDark;
    }

    // 初始化主题
    const isDark = detectTheme();
    applyTheme(isDark);
    console.log('专注模式主题:', isDark ? '暗黑' : '亮色');

    // 初始化
    loadWords();
  </script>
</body>
</html>
